<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopZone Navbar</title>
<style>
  :root{
    --indigo:#5b4ff5;
    --indigo-2:#7a6ffb;
    --indigo-dark:#1a1140;
    --text:#1a1d2b;
    --muted:#5b6072;
    --border:#eef0f5;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background:#f6f7fb;
  }

  nav{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:14px 32px;
    background:#fff;
    border-bottom:1px solid var(--border);
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    text-decoration:none;
  }
  .brand .logo{
    width:34px;height:34px;
    border-radius:9px;
    background:linear-gradient(145deg, var(--indigo-2), #4338d6);
    display:flex;align-items:center;justify-content:center;
    color:#fff;
    font-weight:700;
    font-size:15px;
    box-shadow:0 6px 16px -6px rgba(91,79,245,.55);
  }
  .brand .name{
    font-weight:700;
    font-size:18px;
    color:var(--text);
    letter-spacing:-0.01em;
  }

  .nav-links{
    display:flex;
    align-items:center;
    gap:32px;
  }
  .nav-links a{
    position:relative;
    text-decoration:none;
    color:var(--muted);
    font-size:14.5px;
    font-weight:500;
    padding:6px 2px;
    transition:color .15s ease;
  }
  .nav-links a::after{
    content:"";
    position:absolute;
    left:0; bottom:-2px;
    width:0%;
    height:2px;
    background:var(--indigo);
    border-radius:2px;
    transition:width .2s ease;
  }
  .nav-links a:hover{color:var(--text);}
  .nav-links a:hover::after{width:100%;}
  .nav-links a.active{color:var(--text);}
  .nav-links a.active::after{width:100%;}

  .nav-right{
    display:flex;
    align-items:center;
    gap:18px;
  }

  .cart-btn{
    position:relative;
    display:flex;
    align-items:center;
    justify-content:center;
    width:38px;height:38px;
    border-radius:10px;
    border:1px solid var(--border);
    background:#fff;
    color:var(--text);
    cursor:pointer;
    transition:background .15s ease, border-color .15s ease, transform .15s ease;
  }
  .cart-btn:hover{
    background:#f6f7fb;
    border-color:#dfe2ec;
    transform:translateY(-1px);
  }
  .cart-badge{
    position:absolute;
    top:-5px; right:-5px;
    background:var(--indigo);
    color:#fff;
    font-size:10px;
    font-weight:700;
    min-width:16px;
    height:16px;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0 3px;
    box-shadow:0 0 0 2px #fff;
  }

  .signin-link{
    text-decoration:none;
    font-size:14.5px;
    font-weight:500;
    color:var(--text);
    padding:8px 4px;
    transition:color .15s ease;
  }
  .signin-link:hover{color:var(--indigo);}

  .signup-btn{
    text-decoration:none;
    background:linear-gradient(135deg, var(--indigo), #4338d6);
    color:#fff;
    font-size:14.5px;
    font-weight:600;
    padding:9px 20px;
    border-radius:999px;
    box-shadow:0 8px 18px -8px rgba(91,79,245,.6);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .signup-btn:hover{
    transform:translateY(-1px);
    filter:brightness(1.07);
    box-shadow:0 10px 22px -8px rgba(91,79,245,.7);
  }

  .accent-bar{
    height:4px;
    background:linear-gradient(90deg, var(--indigo-dark), var(--indigo) 35%, var(--indigo-2) 70%, #a89bff);
  }

  .hamburger{
    display:none;
    flex-direction:column;
    gap:4px;
    background:none;
    border:none;
    cursor:pointer;
    padding:6px;
  }
  .hamburger span{
    width:20px;height:2px;
    background:var(--text);
    border-radius:2px;
  }

  @media (max-width:720px){
    .nav-links{
      position:absolute;
      top:100%; left:0; right:0;
      background:#fff;
      flex-direction:column;
      align-items:flex-start;
      gap:0;
      padding:8px 0;
      border-bottom:1px solid var(--border);
      display:none;
    }
    .nav-links.open{display:flex;}
    .nav-links a{width:100%; padding:12px 32px;}
    .nav-links a::after{display:none;}
    .hamburger{display:flex;}
  }
</style>
</head>
<body>

<nav>
  <a href="#" class="brand">
    <div class="logo">S</div>
    <span class="name">ShopZone</span>
  </a>

  <button class="hamburger" id="hamburger" aria-label="Toggle menu">
    <span></span><span></span><span></span>
  </button>

  <div class="nav-links" id="navLinks">
    <a href="#" class="active">Products</a>
    <a href="#">Orders</a>
  </div>

  <div class="nav-right">
    <button class="cart-btn" aria-label="Cart">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="9" cy="21" r="1"></circle>
        <circle cx="20" cy="21" r="1"></circle>
        <path d="M1 1h4l2.68 13.39a2 2 0 002 1.61h9.72a2 2 0 002-1.61L23 6H6"></path>
      </svg>
      <span class="cart-badge">2</span>
    </button>
    <a href="#" class="signin-link">Sign in</a>
    <a href="#" class="signup-btn">Sign up</a>
  </div>
</nav>
<div class="accent-bar"></div>

<script>
  document.getElementById('hamburger').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('open');
  });
</script>

</body>
</html>
