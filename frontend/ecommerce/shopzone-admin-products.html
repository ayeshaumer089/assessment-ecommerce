<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Products — ShopZone Admin</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#161229;
    --ink-soft:#4b4566;
    --paper:#FAF9FC;
    --card:#FFFFFF;
    --line:#E7E3F0;
    --violet:#5B3DF6;
    --violet-deep:#2E1A78;
    --violet-tint:#F1EDFC;
    --mint:#1FAE7E;
    --mint-tint:#EAFAF3;
    --gold:#E8A93B;
    --coral:#FF5A5F;
    --coral-tint:#FFEEEE;
    --radius:18px;
    --shadow: 0 1px 2px rgba(28,15,78,0.04), 0 12px 28px -14px rgba(28,15,78,0.18);
    --sidebar-w:248px;
  }
  *{box-sizing:border-box;}
  body{margin:0;font-family:'Inter',sans-serif;color:var(--ink);background:var(--paper);-webkit-font-smoothing:antialiased;}
  h1,h2,h3{font-family:'Fraunces',serif;margin:0;letter-spacing:-0.01em;}
  a{color:inherit;text-decoration:none;}
  button,input,select,textarea{font-family:inherit;}

  /* ---------- SIDEBAR ---------- */
  .sidebar{position:fixed;top:0;left:0;bottom:0;width:var(--sidebar-w);background:linear-gradient(190deg,#1C0F4E,#160B3E 60%,#120931);color:#fff;display:flex;flex-direction:column;z-index:40;}
  .sidebar-brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:18px;padding:24px 22px;}
  .sidebar-brand .mark{width:32px;height:32px;border-radius:9px;background:linear-gradient(150deg,#8C72FF,var(--violet));color:#fff;display:flex;align-items:center;justify-content:center;font-family:'Fraunces',serif;font-weight:600;font-size:16px;}
  .sidebar-nav{padding:8px 14px;display:flex;flex-direction:column;gap:3px;}
  .nav-item{display:flex;align-items:center;gap:12px;padding:11px 14px;border-radius:11px;font-size:14px;font-weight:500;color:#B6ADD6;transition:background .15s ease, color .15s ease;}
  .nav-item .ic{font-size:16px;width:18px;text-align:center;}
  .nav-item:hover{background:rgba(255,255,255,0.06);color:#fff;}
  .nav-item.active{background:var(--violet);color:#fff;font-weight:700;box-shadow:0 8px 18px -8px rgba(91,61,246,0.7);}
  .sidebar-collapse{position:absolute;top:22px;right:-12px;width:24px;height:24px;border-radius:100px;background:#fff;color:var(--violet);display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:var(--shadow);cursor:pointer;}

  /* ---------- MAIN ---------- */
  .main{margin-left:var(--sidebar-w);min-height:100vh;display:flex;flex-direction:column;}
  .topbar{position:sticky;top:0;z-index:30;background:rgba(250,249,252,0.9);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:16px 32px;}
  .topbar .crumb{font-size:14.5px;font-weight:600;color:var(--ink-soft);}
  .topbar .crumb b{color:var(--ink);}
  .topbar-right{display:flex;align-items:center;gap:20px;}
  .search-mini{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:100px;padding:8px 14px;color:#9A93AE;font-size:13.5px;min-width:190px;}
  .bell-wrap{position:relative;color:var(--ink-soft);font-size:17px;}
  .bell-dot{position:absolute;top:-2px;right:-2px;width:8px;height:8px;border-radius:100px;background:var(--coral);border:1.5px solid var(--paper);}
  .user-chip{display:flex;align-items:center;gap:9px;font-weight:600;font-size:14px;}
  .avatar{width:30px;height:30px;border-radius:100px;background:var(--violet-tint);color:var(--violet);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;}

  .content{padding:30px 32px 70px;}
  .content-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:22px;}
  .content-head h1{font-size:30px;font-weight:600;}
  .btn-add{background:var(--violet);color:#fff;border:none;border-radius:100px;padding:13px 22px;font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background .2s ease;}
  .btn-add:hover{background:var(--violet-deep);}

  .search-row{margin-bottom:20px;}
  .search-bar{display:flex;align-items:center;gap:10px;background:var(--card);border:1px solid var(--line);border-radius:100px;padding:13px 20px;font-size:14px;color:#9A93AE;max-width:420px;}
  .search-bar input{border:none;outline:none;background:transparent;font-size:14px;color:var(--ink);width:100%;}

  /* ---------- TABLE ---------- */
  .table-panel{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
  table{width:100%;border-collapse:collapse;}
  thead th{text-align:left;font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:#9A93AE;padding:14px 18px;border-bottom:1px solid var(--line);background:#FBFAFD;white-space:nowrap;}
  tbody tr{border-bottom:1px solid var(--line);transition:background .15s ease;}
  tbody tr:last-child{border-bottom:none;}
  tbody tr:hover{background:#FAF9FE;}
  tbody td{padding:14px 18px;vertical-align:middle;font-size:14px;}
  .thumb{width:46px;height:46px;border-radius:10px;overflow:hidden;background:#1c1c22;}
  .thumb img{width:100%;height:100%;object-fit:cover;}
  .prod-name{font-weight:700;font-size:14.5px;}
  .prod-cat{font-size:12.5px;color:var(--violet);font-weight:600;margin-top:2px;}
  .price-cell{font-weight:700;font-family:'Fraunces',serif;font-size:14.5px;}
  .muted{color:#C3BDD6;}
  .stock-pill{background:var(--mint-tint);color:#0E8C5F;font-weight:700;font-size:12.5px;padding:4px 11px;border-radius:100px;display:inline-block;}
  .rating-cell{display:flex;align-items:center;gap:5px;color:var(--gold);font-size:13.5px;font-weight:600;}
  .actions-cell{display:flex;gap:14px;justify-content:flex-end;font-size:13.5px;font-weight:600;}
  .act-edit{color:var(--violet);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .act-edit:hover{color:var(--violet-deep);}
  .act-delete{color:var(--coral);cursor:pointer;display:inline-flex;align-items:center;gap:5px;}
  .act-delete:hover{color:#D6373C;}
  th:last-child, td.actions-cell{text-align:right;}

  /* ---------- MODAL ---------- */
  .overlay{position:fixed;inset:0;background:rgba(20,12,50,0.45);backdrop-filter:blur(2px);display:none;align-items:center;justify-content:center;z-index:100;padding:20px;}
  .overlay.show{display:flex;}
  .modal{background:#fff;border-radius:20px;width:100%;max-width:520px;padding:28px 30px 26px;box-shadow:0 30px 70px -20px rgba(20,12,50,0.4);max-height:90vh;overflow-y:auto;}
  .modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
  .modal-head h2{font-size:21px;font-weight:600;}
  .modal-close{color:#B4AECB;font-size:18px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:8px;}
  .modal-close:hover{background:#F5F3FA;color:var(--ink);}

  .field{display:flex;flex-direction:column;gap:7px;margin-bottom:16px;}
  .field-row{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .field label{font-size:13px;font-weight:700;}
  .field input, .field select, .field textarea{border:1px solid var(--line);border-radius:11px;padding:11px 14px;font-size:14px;color:var(--ink);outline:none;transition:border-color .15s ease, box-shadow .15s ease;background:#fff;}
  .field input:focus, .field select:focus, .field textarea:focus{border-color:var(--violet);box-shadow:0 0 0 3px rgba(91,61,246,0.12);}
  .field textarea{resize:vertical;min-height:80px;}

  .modal-foot{display:flex;justify-content:flex-end;gap:12px;margin-top:6px;}
  .btn-cancel{padding:11px 20px;border:1px solid var(--line);border-radius:100px;font-weight:600;font-size:13.5px;background:#fff;cursor:pointer;color:var(--ink-soft);}
  .btn-cancel:hover{background:#F5F3FA;}
  .btn-save{padding:11px 22px;border:none;border-radius:100px;font-weight:700;font-size:13.5px;background:var(--violet);color:#fff;cursor:pointer;}
  .btn-save:hover{background:var(--violet-deep);}

  .modal-delete{max-width:440px;}
  .delete-text{font-size:14.5px;color:var(--ink-soft);line-height:1.6;margin-bottom:4px;}
  .btn-delete-confirm{padding:11px 22px;border:none;border-radius:100px;font-weight:700;font-size:13.5px;background:var(--coral);color:#fff;cursor:pointer;}
  .btn-delete-confirm:hover{background:#D6373C;}

  @media (max-width:1100px){
    .table-panel{overflow-x:auto;}
    table{min-width:880px;}
  }
  @media (max-width:760px){
    .sidebar{display:none;}
    .main{margin-left:0;}
    .field-row{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-collapse">‹</div>
  <div class="sidebar-brand"><span class="mark">S</span>ShopZone</div>
  <nav class="sidebar-nav">
    <a class="nav-item" href="#"><span class="ic">▦</span> Dashboard</a>
    <a class="nav-item active" href="#"><span class="ic">🛍</span> Products</a>
    <a class="nav-item" href="#"><span class="ic">📦</span> Orders</a>
    <a class="nav-item" href="#"><span class="ic">👥</span> Customers</a>
    <a class="nav-item" href="#"><span class="ic">📈</span> Analytics</a>
  </nav>
</aside>

<div class="main">

  <div class="topbar">
    <div class="crumb"><b>Products</b></div>
    <div class="topbar-right">
      <div class="search-mini">🔍 Search... <span style="margin-left:auto;color:#C4BEDB;">⌘K</span></div>
      <div class="bell-wrap">🔔<span class="bell-dot"></span></div>
      <div class="user-chip"><span class="avatar">A</span> Admin User</div>
    </div>
  </div>

  <div class="content">
    <div class="content-head">
      <h1>Products</h1>
      <button class="btn-add" onclick="openAdd()">+ Add Product</button>
    </div>

    <div class="search-row">
      <div class="search-bar">🔍 <input type="text" placeholder="Search products..."></div>
    </div>

    <div class="table-panel">
      <table>
        <thead>
          <tr>
            <th>Thumbnail</th><th>Product</th><th>Price</th><th>Discount</th><th>Stock</th><th>Rating</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="prodTbody">
          <!-- rows injected by JS -->
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- ADD / EDIT MODAL -->
<div class="overlay" id="formOverlay">
  <div class="modal">
    <div class="modal-head">
      <h2 id="formTitle">Add Product</h2>
      <span class="modal-close" onclick="closeForm()">✕</span>
    </div>

    <div class="field">
      <label>Name</label>
      <input type="text" id="f_name" placeholder="">
    </div>

    <div class="field-row">
      <div class="field">
        <label>Price</label>
        <input type="text" id="f_price" placeholder="0">
      </div>
      <div class="field">
        <label>Stock</label>
        <input type="text" id="f_stock" placeholder="0">
      </div>
    </div>

    <div class="field">
      <label>Category</label>
      <select id="f_category">
        <option value="">Select a category</option>
        <option>Sports</option>
        <option>Electronics</option>
        <option>Clothing</option>
        <option>Home &amp; Garden</option>
        <option>Books</option>
      </select>
    </div>

    <div class="field">
      <label>Image URL</label>
      <input type="text" id="f_image" placeholder="https://example.com/product.jpg">
    </div>

    <div class="field" style="margin-bottom:6px;">
      <label>Description</label>
      <textarea id="f_desc" placeholder="Describe the product..."></textarea>
    </div>

    <div class="modal-foot">
      <button class="btn-cancel" onclick="closeForm()">Cancel</button>
      <button class="btn-save" id="formSaveBtn" onclick="closeForm()">Add Product</button>
    </div>
  </div>
</div>

<!-- DELETE MODAL -->
<div class="overlay" id="deleteOverlay">
  <div class="modal modal-delete">
    <div class="modal-head">
      <h2>Delete Product</h2>
      <span class="modal-close" onclick="closeDelete()">✕</span>
    </div>
    <div class="delete-text">Are you sure you want to delete <b id="deleteProdName">this product</b>? This action cannot be undone.</div>
    <div class="modal-foot" style="margin-top:18px;">
      <button class="btn-cancel" onclick="closeDelete()">Cancel</button>
      <button class="btn-delete-confirm" onclick="closeDelete()">Delete</button>
    </div>
  </div>
</div>

<script>
  const products = [
    {name:"Running Shoes", cat:"sports", price:"129.99", stock:45, rating:"0.0", img:"https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=200&q=80"},
    {name:"Bluetooth Speaker", cat:"electronics", price:"79.99", stock:63, rating:"0.0", img:"https://images.unsplash.com/photo-1608043152269-423dbba4e7e1?w=200&q=80"},
    {name:"Denim Jeans", cat:"clothing", price:"59.99", stock:115, rating:"0.0", img:"https://images.unsplash.com/photo-1542272604-787c3835535d?w=200&q=80"},
    {name:"Smart Watch", cat:"electronics", price:"299.99", stock:30, rating:"0.0", img:"https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=200&q=80"},
    {name:"Laptop Backpack", cat:"clothing", price:"49.99", stock:100, rating:"0.0", img:"https://images.unsplash.com/photo-1553062407-98eeb64c6a62?w=200&q=80"},
    {name:"Organic Cotton T-Shirt", cat:"clothing", price:"24.99", stock:200, rating:"0.0", img:"https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=200&q=80"},
    {name:"Desk Lamp", cat:"home-garden", price:"39.99", stock:75, rating:"0.0", img:"https://images.unsplash.com/photo-1507473885765-e6ed057f782c?w=200&q=80"},
    {name:"Indoor Plant", cat:"home-garden", price:"29.99", stock:40, rating:"0.0", img:"https://images.unsplash.com/photo-1459411621453-7b03977f4bfc?w=200&q=80"},
    {name:"Programming Book", cat:"books", price:"44.99", stock:60, rating:"0.0", img:"https://images.unsplash.com/photo-1544947950-fa07a98d237f?w=200&q=80"},
    {name:"Fiction Novel", cat:"books", price:"19.99", stock:80, rating:"0.0", img:"https://images.unsplash.com/photo-1476275466078-4007374efbbe?w=200&q=80"},
    {name:"Wireless Headphones", cat:"electronics", price:"199.99", stock:50, rating:"0.0", img:"https://images.unsplash.com/photo-1505740420928-5e560c06d30e?w=200&q=80"},
  ];

  const tbody = document.getElementById('prodTbody');
  products.forEach((p,i)=>{
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><div class="thumb"><img src="${p.img}" alt="${p.name}"></div></td>
      <td><div class="prod-name">${p.name}</div><div class="prod-cat">${p.cat}</div></td>
      <td class="price-cell">$${p.price}</td>
      <td class="muted">—</td>
      <td><span class="stock-pill">${p.stock}</span></td>
      <td><div class="rating-cell">★ ${p.rating}</div></td>
      <td class="actions-cell">
        <span class="act-edit" onclick="openEdit(${i})">✎ Edit</span>
        <span class="act-delete" onclick="openDelete('${p.name}')">🗑 Delete</span>
      </td>
    `;
    tbody.appendChild(tr);
  });

  function openAdd(){
    document.getElementById('formTitle').textContent = 'Add Product';
    document.getElementById('formSaveBtn').textContent = 'Add Product';
    document.getElementById('f_name').value = '';
    document.getElementById('f_price').value = '';
    document.getElementById('f_stock').value = '';
    document.getElementById('f_category').value = '';
    document.getElementById('f_image').value = '';
    document.getElementById('f_desc').value = '';
    document.getElementById('formOverlay').classList.add('show');
  }
  function openEdit(i){
    const p = products[i];
    document.getElementById('formTitle').textContent = 'Edit Product';
    document.getElementById('formSaveBtn').textContent = 'Save Changes';
    document.getElementById('f_name').value = p.name;
    document.getElementById('f_price').value = p.price;
    document.getElementById('f_stock').value = p.stock;
    document.getElementById('f_image').value = p.img;
    document.getElementById('f_desc').value = '';
    document.getElementById('formOverlay').classList.add('show');
  }
  function closeForm(){ document.getElementById('formOverlay').classList.remove('show'); }

  function openDelete(name){
    document.getElementById('deleteProdName').textContent = name;
    document.getElementById('deleteOverlay').classList.add('show');
  }
  function closeDelete(){ document.getElementById('deleteOverlay').classList.remove('show'); }

  document.querySelectorAll('.overlay').forEach(ov=>{
    ov.addEventListener('click', e=>{ if(e.target===ov) ov.classList.remove('show'); });
  });
</script>

</body>
</html>
