<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ShopZone Admin</title>
<style>
  :root{
    --bg-0:#0a0e1a;
    --bg-1:#0f1525;
    --panel:#141b2e;
    --panel-2:#10172a;
    --border:#232c45;
    --indigo:#5b4ff5;
    --indigo-2:#7a6ffb;
    --text:#eef0fa;
    --muted:#8891ac;
    --muted-2:#5f6889;
    --danger:#ff6868;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:
      radial-gradient(800px 400px at 20% -10%, #1d1450 0%, transparent 60%),
      radial-gradient(700px 500px at 100% 10%, #0e2150 0%, transparent 55%),
      var(--bg-0);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    color:var(--text);
    padding:24px;
  }

  .wrap{
    width:100%;
    max-width:400px;
    animation: rise .5s ease both;
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(14px);}
    to{opacity:1; transform:translateY(0);}
  }

  .brand{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-bottom:28px;
  }
  .logo{
    width:56px;height:56px;
    border-radius:16px;
    background:linear-gradient(145deg, var(--indigo-2), #4338d6);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 10px 30px -8px rgba(91,79,245,.55);
    margin-bottom:16px;
  }
  .brand h1{
    font-size:24px;
    font-weight:700;
    margin:0 0 4px;
    letter-spacing:-0.01em;
  }
  .brand p{
    margin:0;
    font-size:13px;
    color:var(--muted);
  }

  .card{
    background:linear-gradient(180deg, var(--panel), var(--panel-2));
    border:1px solid var(--border);
    border-radius:18px;
    padding:24px;
    box-shadow:0 20px 50px -20px rgba(0,0,0,.6);
  }

  label{
    display:block;
    font-size:12.5px;
    font-weight:600;
    color:#c7cbe0;
    margin-bottom:7px;
    letter-spacing:.01em;
  }
  .field{margin-bottom:16px;}

  .input-shell{
    position:relative;
    display:flex;
    align-items:center;
  }
  .input-shell svg.left-icon{
    position:absolute;
    left:13px;
    color:var(--muted-2);
    pointer-events:none;
  }
  input[type="email"],
  input[type="password"],
  input[type="text"]{
    width:100%;
    background:#0c1120;
    border:1px solid var(--border);
    border-radius:11px;
    padding:12px 14px 12px 38px;
    font-size:14px;
    color:var(--text);
    outline:none;
    transition:border-color .15s ease, box-shadow .15s ease, background .15s ease;
  }
  input::placeholder{color:var(--muted-2);}
  input:focus{
    border-color:var(--indigo-2);
    box-shadow:0 0 0 3px rgba(122,111,251,.18);
    background:#0e1426;
  }

  .toggle-eye{
    position:absolute;
    right:12px;
    background:none;
    border:none;
    color:var(--muted-2);
    cursor:pointer;
    padding:4px;
    display:flex;
    border-radius:6px;
    transition:color .15s ease;
  }
  .toggle-eye:hover{color:var(--text);}

  .row-between{
    display:flex;
    justify-content:flex-end;
    margin:-6px 0 16px;
  }
  .row-between a{
    font-size:12.5px;
    color:var(--indigo-2);
    text-decoration:none;
  }
  .row-between a:hover{text-decoration:underline;}

  .btn-primary{
    width:100%;
    border:none;
    border-radius:11px;
    padding:13px;
    font-size:14.5px;
    font-weight:600;
    color:#fff;
    cursor:pointer;
    background:linear-gradient(135deg, var(--indigo), #4338d6);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    box-shadow:0 12px 24px -10px rgba(91,79,245,.6);
    transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
  }
  .btn-primary:hover{
    transform:translateY(-1px);
    filter:brightness(1.06);
    box-shadow:0 16px 30px -10px rgba(91,79,245,.7);
  }
  .btn-primary:active{transform:translateY(0);}

  .error-msg{
    display:none;
    align-items:center;
    gap:8px;
    background:rgba(255,104,104,.08);
    border:1px solid rgba(255,104,104,.35);
    color:#ff9a9a;
    font-size:12.5px;
    padding:10px 12px;
    border-radius:10px;
    margin-bottom:16px;
  }
  .error-msg.show{display:flex;}

  .divider{
    border:none;
    border-top:1px solid var(--border);
    margin:22px 0 16px;
  }

  .demo-box{
    background:#0c1120;
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px;
  }
  .demo-title{
    font-size:11px;
    font-weight:700;
    letter-spacing:.08em;
    color:var(--muted-2);
    margin-bottom:10px;
  }
  .demo-row{
    display:flex;
    justify-content:space-between;
    font-size:12.5px;
    padding:4px 0;
  }
  .demo-row span:first-child{color:var(--muted);}
  .demo-row span:last-child{
    color:#cfd3ec;
    font-family:ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  .autofill-btn{
    width:100%;
    margin-top:10px;
    background:rgba(122,111,251,.1);
    border:1px solid rgba(122,111,251,.3);
    color:var(--indigo-2);
    font-size:12.5px;
    font-weight:600;
    padding:9px;
    border-radius:9px;
    cursor:pointer;
    transition:background .15s ease;
  }
  .autofill-btn:hover{background:rgba(122,111,251,.18);}

  .footer-link{
    text-align:center;
    font-size:13px;
    color:var(--muted);
    margin-top:22px;
  }
  .footer-link a{
    color:var(--indigo-2);
    text-decoration:none;
    font-weight:600;
  }
  .footer-link a:hover{text-decoration:underline;}
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="logo">
      <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
        <path d="M9 12l2 2 4-4"></path>
      </svg>
    </div>
    <h1>ShopZone Admin</h1>
    <p>Restricted access — authorized personnel only</p>
  </div>

  <div class="card">
    <div class="error-msg" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
      <span>Invalid email or password. Try again.</span>
    </div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-shell">
          <svg class="left-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" stroke="none"/><path d="M22 6l-10 7L2 6"></path><rect x="2" y="4" width="20" height="16" rx="2"></rect></svg>
          <input type="email" id="email" placeholder="admin@example.com" autocomplete="username" required>
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-shell">
          <svg class="left-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2"></rect><path d="M7 11V7a5 5 0 0110 0v4"></path></svg>
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
          <button type="button" class="toggle-eye" id="toggleEye" aria-label="Show password">
            <svg id="eyeIcon" width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
          </button>
        </div>
      </div>

      <div class="row-between">
        <a href="#">Forgot password?</a>
      </div>

      <button type="submit" class="btn-primary">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        Sign in to Admin
      </button>
    </form>

    <hr class="divider">

    <div class="demo-box">
      <div class="demo-title">DEMO CREDENTIALS</div>
      <div class="demo-row"><span>Email:</span><span>admin@example.com</span></div>
      <div class="demo-row"><span>Password:</span><span>Admin123!</span></div>
      <button class="autofill-btn" id="autofillBtn">Auto-fill demo credentials</button>
    </div>
  </div>

  <p class="footer-link">Not an admin? <a href="#">Return to store</a></p>
</div>

<script>
  const pwd = document.getElementById('password');
  const eyeBtn = document.getElementById('toggleEye');
  const eyeIcon = document.getElementById('eyeIcon');

  eyeBtn.addEventListener('click', () => {
    const show = pwd.type === 'password';
    pwd.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show
      ? '<path d="M17.94 17.94A10.94 10.94 0 0112 19c-7 0-11-7-11-7a18.6 18.6 0 015.06-5.94M9.9 4.24A9.12 9.12 0 0112 4c7 0 11 7 11 7a18.5 18.5 0 01-2.16 3.19m-6.72-1.07a3 3 0 11-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
  });

  document.getElementById('autofillBtn').addEventListener('click', () => {
    document.getElementById('email').value = 'admin@example.com';
    pwd.value = 'Admin123!';
  });

  document.getElementById('loginForm').addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = pwd.value;
    const err = document.getElementById('errorMsg');
    if (email === 'admin@example.com' && password === 'Admin123!') {
      err.classList.remove('show');
      alert('Signed in successfully!');
    } else {
      err.classList.add('show');
    }
  });
</script>

</body>
</html>
