<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Delete Product</title>
<style>
  :root{
    --bg-overlay: rgba(15,15,20,0.55);
    --card-bg: #ffffff;
    --ink: #16161d;
    --ink-soft: #6b6b78;
    --line: #e7e7ee;
    --danger: #e5484d;
    --danger-soft: #fdeceb;
    --danger-deep: #c8332f;
    --radius: 18px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    font-family:'Segoe UI',-apple-system,BlinkMacSystemFont,Helvetica,Arial,sans-serif;
    background:
      radial-gradient(circle at 20% 20%, #2b2b3d, transparent 60%),
      radial-gradient(circle at 80% 80%, #1f1f2e, transparent 60%),
      #14141c;
    background-attachment:fixed;
  }
  .overlay{
    position:relative;
    width:100%;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--bg-overlay);
    backdrop-filter:blur(4px);
  }
  .modal{
    width:400px;
    max-width:90vw;
    background:var(--card-bg);
    border-radius:var(--radius);
    box-shadow:0 30px 60px -15px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04);
    overflow:hidden;
    animation:rise .35s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes rise{
    from{opacity:0; transform:translateY(14px) scale(.98);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .modal-header{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    padding:24px 26px 16px;
    gap:14px;
  }
  .header-left{
    display:flex;
    align-items:center;
    gap:14px;
  }
  .icon-wrap{
    width:42px; height:42px;
    flex-shrink:0;
    border-radius:12px;
    background:var(--danger-soft);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .icon-wrap svg{ width:21px; height:21px; }
  .modal-header h2{
    margin:0;
    font-size:18px;
    font-weight:700;
    color:var(--ink);
    letter-spacing:.2px;
  }
  .close-btn{
    width:30px; height:30px;
    border:none;
    background:transparent;
    border-radius:8px;
    color:var(--ink-soft);
    font-size:16px;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    transition:.15s;
    flex-shrink:0;
  }
  .close-btn:hover{ background:#f2f2f7; color:var(--ink); }

  .modal-body{
    padding:0 26px 24px 82px;
  }
  .modal-body p{
    margin:0;
    font-size:14.5px;
    line-height:1.55;
    color:var(--ink-soft);
  }
  .modal-body strong{ color:var(--ink); font-weight:700; }

  .modal-footer{
    display:flex;
    justify-content:flex-end;
    gap:10px;
    padding:16px 26px 24px;
    border-top:1px solid var(--line);
    padding-top:18px;
  }
  .btn{
    padding:10px 20px;
    font-size:14px;
    font-weight:600;
    border-radius:10px;
    border:none;
    cursor:pointer;
    transition:.15s transform, .15s box-shadow, .15s background;
  }
  .btn:active{ transform:scale(.97); }
  .btn-cancel{
    background:#fff;
    color:var(--ink-soft);
    border:1.5px solid var(--line);
  }
  .btn-cancel:hover{ background:#f5f5f8; color:var(--ink); }
  .btn-danger{
    background:linear-gradient(135deg, var(--danger), var(--danger-deep));
    color:#fff;
    box-shadow:0 8px 18px -6px rgba(229,72,77,0.55);
  }
  .btn-danger:hover{ box-shadow:0 10px 22px -6px rgba(229,72,77,0.7); }
</style>
</head>
<body>
<div class="overlay">
  <div class="modal">
    <div class="modal-header">
      <div class="header-left">
        <div class="icon-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e5484d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 6h18"></path>
            <path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
            <path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
            <line x1="10" y1="11" x2="10" y2="17"></line>
            <line x1="14" y1="11" x2="14" y2="17"></line>
          </svg>
        </div>
        <h2>Delete Product</h2>
      </div>
      <button class="close-btn">✕</button>
    </div>
    <div class="modal-body">
      <p>Are you sure you want to delete <strong>Running Shoes</strong>? This action cannot be undone.</p>
    </div>
    <div class="modal-footer">
      <button class="btn btn-cancel">Cancel</button>
      <button class="btn btn-danger">Delete</button>
    </div>
  </div>
</div>
</body>
</html>
